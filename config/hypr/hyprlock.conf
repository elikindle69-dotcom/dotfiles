$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
    ignore_empty_input = true
    immediate_render = false
    text_trim = true
    fractional_scaling = 2
    screencopy_mode = 0
}

auth {
    pam {
        enabled = true
    }
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 3
    vibrancy = 0.8576
}

input-field {
    monitor =
    size = 25%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.1)
    outer_color = rgba(51, 204, 255, 0.93)

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 12

    font_family = $font
    placeholder_text = 
    fail_text = $PAMFAIL ($ATTEMPTS)
    check_text = Authenticating...

    dots_size = 0.23
    dots_spacing = 0.28

    shadow_passes = 8
    shadow_size = 6
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2

    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 80
    font_family = $font

    shadow_passes = 8
    shadow_size = 6
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2

    position = 0, 150
    halign = center
    valign = center
}
